<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zenfix - 全銀フォーマット自動変換API</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">
  <div class="max-w-3xl mx-auto py-12 px-4 sm:px-6 lg:px-8">
    <div class="text-center mb-10">
      <h1 class="text-4xl font-extrabold text-blue-600 tracking-tight">Zenfix</h1>
      <p class="mt-4 text-lg text-gray-600">全銀フォーマットの全角カナ・英数字エラーを瞬時に半角へ自動補正</p>
    </div>

    <div class="bg-white shadow-lg rounded-lg p-6 mb-8">
      <h2 class="text-xl font-bold mb-4">無料デモ（全角→半角 変換テスト）</h2>
      <textarea id="inputText" rows="4" class="w-full border-gray-300 rounded-md shadow-sm p-3 focus:ring-blue-500 focus:border-blue-500 border" placeholder="ここに全角文字（例：ＡＢＣＤ１２３４）を入力してください"></textarea>
      
      <div class="mt-4 text-center">
        <button id="convertBtn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-full transition duration-300 shadow-md">
          瞬時に変換する
        </button>
      </div>

      <div class="mt-6">
        <h3 class="text-sm font-semibold text-gray-500 mb-2">変換結果</h3>
        <textarea id="outputText" rows="4" class="w-full bg-gray-50 border-gray-300 rounded-md p-3 text-blue-800 font-mono" readonly placeholder="変換結果がここに表示されます"></textarea>
      </div>
    </div>

    <div class="text-center bg-blue-50 border border-blue-200 rounded-lg p-6">
      <h2 class="text-2xl font-bold text-blue-900 mb-4">法人のシステムにAPIとして組み込む</h2>
      <p class="text-gray-700 mb-6">社内システムから直接ZenfixのAPIを呼び出し、変換を完全自動化できます。エラー対応の労働から解放されましょう。</p>
      <a href="https://buy.stripe.com/test_28E14n3RG01k0f378p6wE00" class="inline-block bg-gray-800 hover:bg-gray-900 text-white font-bold py-3 px-8 rounded border-b-4 border-gray-950">
        API利用プランを契約する (月額 9,800円)
      </a>
    </div>
  </div>

  <script>
    document.getElementById('convertBtn').addEventListener('click', async () => {
      const text = document.getElementById('inputText').value;
      if (!text) { alert('テキストを入力してください'); return; }

      document.getElementById('convertBtn').innerText = '変換中...';

      try {
        // 同じサーバー内にある私達のAPI（/api/convert）を呼び出す
        const response = await fetch('/api/convert', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text: text })
        });
        
        const data = await response.json();
        
        if (data.success) {
          document.getElementById('outputText').value = data.converted_text;
        } else {
          alert('エラー: ' + data.error);
        }
      } catch (error) {
        alert('通信エラーが発生しました');
      } finally {
        document.getElementById('convertBtn').innerText = '瞬時に変換する';
      }
    });
  </script>
</body>
</html>
